  <body>
  <div class="navbar">
    <div class="app-name">
      <h2>D<div></div>rmD<div></div>List</h2>
    </div>
  <div class="role">
    <div class="role-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-6">
        <path d="M10 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM3.465 14.493a1.23 1.23 0 0 0 .41 1.412A9.957 9.957 0 0 0 10 18c2.31 0 4.438-.784 6.131-2.1.43-.333.604-.903.408-1.41a7.002 7.002 0 0 0-13.074.003Z" />
      </svg>
      <div class="role-status">
        <p class="admin-btn">Admin</p>

    </div>
    </div>

    <img  alt = "profile-img" class="profile-pic" src=""/>
    <input type="file" id="profile-input" style="display:none">

  </div>
  </div>


    <div class="container">


      <section class="admin-container">
        <!-- <div class="layout"> -->
        

          <section class="task-assigning">
            <!-- header -->
            <div class="task-assigning__header">
              <div class="task-assigning__title-count-wrapper">
                <div class="task-assigning__title">

                  <h2>Pending Tasks</h2>

                </div>


              </div>
              <div class="add-task-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="add-task-icon">
                <path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25ZM12.75 9a.75.75 0 0 0-1.5 0v2.25H9a.75.75 0 0 0 0 1.5h2.25V15a.75.75 0 0 0 1.5 0v-2.25H15a.75.75 0 0 0 0-1.5h-2.25V9Z" clip-rule="evenodd" />
              </svg>
              <div class="add-task">Add Task</div>
              </div>

            </div>

            <div class="user-assigned-tasks-container">
              <div class="user-assigned-tasks__labels">
                <div class="user-assigned-tasks__header">Description</div>
                <div class="user-assigned-tasks__header">Due</div>
                <div class="user-assigned-tasks__header">Assignee</div>
                <div class="user-assigned-tasks__header">Icons</div>
              </div>

              <div class="user-assigned-tasks__all-rows">
                <div class="row">
                  <div class="user-assigned-tasks__data">Task 1</div>
                  <div class="user-assigned-tasks__data">Tomorrow</div>
                  <div class="user-assigned-tasks__data">  <img src="" alt="Profile" /></div>
                  <div class="user-assigned-tasks__data"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6 editIcon">
                    <path d="M21.731 2.269a2.625 2.625 0 0 0-3.712 0l-1.157 1.157 3.712 3.712 1.157-1.157a2.625 2.625 0 0 0 0-3.712ZM19.513 8.199l-3.712-3.712-12.15 12.15a5.25 5.25 0 0 0-1.32 2.214l-.8 2.685a.75.75 0 0 0 .933.933l2.685-.8a5.25 5.25 0 0 0 2.214-1.32L19.513 8.2Z" />
                  </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6 deleteIcon">
                      <path fill-rule="evenodd" d="M16.5 4.478v.227a48.816 48.816 0 0 1 3.878.512.75.75 0 1 1-.256 1.478l-.209-.035-1.005 13.07a3 3 0 0 1-2.991 2.77H8.084a3 3 0 0 1-2.991-2.77L4.087 6.66l-.209.035a.75.75 0 0 1-.256-1.478A48.567 48.567 0 0 1 7.5 4.705v-.227c0-1.564 1.213-2.9 2.816-2.951a52.662 52.662 0 0 1 3.369 0c1.603.051 2.815 1.387 2.815 2.951Zm-6.136-1.452a51.196 51.196 0 0 1 3.273 0C14.39 3.05 15 3.684 15 4.478v.113a49.488 49.488 0 0 0-6 0v-.113c0-.794.609-1.428 1.364-1.452Zm-.355 5.945a.75.75 0 1 0-1.5.058l.347 9a.75.75 0 1 0 1.499-.058l-.346-9Zm5.48.058a.75.75 0 1 0-1.498-.058l-.347 9a.75.75 0 0 0 1.5.058l.345-9Z" clip-rule="evenodd" />
                    </svg></div>
                </div>
              </div>
            </div>

            <!-- 5th child -->
            <div class="task-form-wrapper">
            <form class="taskform hidden">
              <div class="close-model">
<!--                <button type="button" class="close-model__btn">x</button>-->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-6 close-model__btn">
                  <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM8.28 7.22a.75.75 0 0 0-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 1 0 1.06 1.06L10 11.06l1.72 1.72a.75.75 0 1 0 1.06-1.06L11.06 10l1.72-1.72a.75.75 0 0 0-1.06-1.06L10 8.94 8.28 7.22Z" clip-rule="evenodd" />
                </svg>

              </div>
              <div class="task-description">
                <label for="task-description"> Description</label>
                <input
                  id="task-description"
                  type="text"
                  name="taskDescription"
                  required
                />
              </div>

              <div class="duedate">
                <label for="task-duedate">Due date</label>
                <input type="date" id="task-duedate" name="duedate" required />
              </div>

              <div class="assigned-task">
                <label for="assignedtask"
                  >Who u want to assign the task to?</label
                >
                <select id="assignedtask" name="userId" required>
                  <option value="">--Select--</option>
<!--                  <option value="17">kenzie</option>-->
<!--                  <option value="2">sarah</option>-->
<!--                  <option value="18">lisa</option>-->
<!--                  <option >johar</option>-->
<!--                  <option >peter</option>-->

                </select>
              </div>
              <div class="add-task-btn">
                <button type="submit" class="add-btn">add task</button>
                <button class="update-btn hidden">update task</button>
              </div>
            </form>
            </div>
          </section>

    <section class="user-completed-tasks-container-wrapper">
        <div class="user-completed-tasks__title">
          <h2>Completed tasks</h2>
        </div>
        <div class="user-completed-tasks-container">
          <div class="user-completed-tasks__labels">
            <div class="user-completed-tasks__header">Description</div>
            <div class="user-completed-tasks__header">Due</div>
            <div class="user-completed-tasks__header">Assignee</div>
            <div class="user-completed-tasks__header">Icons</div>
          </div>

          <div class="user-completed-tasks__all-rows">
            <div class="row">
              <div class="user-completed-tasks__data">Task 1</div>
              <div class="user-completed-tasks__data">Tomorrow</div>
              <div class="user-completed-tasks__data">  <img src="" alt="Profile" /></div>
              <div class="user-completed-tasks__data"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6 editIcon">
                <path d="M21.731 2.269a2.625 2.625 0 0 0-3.712 0l-1.157 1.157 3.712 3.712 1.157-1.157a2.625 2.625 0 0 0 0-3.712ZM19.513 8.199l-3.712-3.712-12.15 12.15a5.25 5.25 0 0 0-1.32 2.214l-.8 2.685a.75.75 0 0 0 .933.933l2.685-.8a5.25 5.25 0 0 0 2.214-1.32L19.513 8.2Z" />
              </svg>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6 deleteIcon">
                  <path fill-rule="evenodd" d="M16.5 4.478v.227a48.816 48.816 0 0 1 3.878.512.75.75 0 1 1-.256 1.478l-.209-.035-1.005 13.07a3 3 0 0 1-2.991 2.77H8.084a3 3 0 0 1-2.991-2.77L4.087 6.66l-.209.035a.75.75 0 0 1-.256-1.478A48.567 48.567 0 0 1 7.5 4.705v-.227c0-1.564 1.213-2.9 2.816-2.951a52.662 52.662 0 0 1 3.369 0c1.603.051 2.815 1.387 2.815 2.951Zm-6.136-1.452a51.196 51.196 0 0 1 3.273 0C14.39 3.05 15 3.684 15 4.478v.113a49.488 49.488 0 0 0-6 0v-.113c0-.794.609-1.428 1.364-1.452Zm-.355 5.945a.75.75 0 1 0-1.5.058l.347 9a.75.75 0 1 0 1.499-.058l-.346-9Zm5.48.058a.75.75 0 1 0-1.498-.058l-.347 9a.75.75 0 0 0 1.5.058l.345-9Z" clip-rule="evenodd" />
                </svg></div>
            </div>
          </div>
        </div>
      </section>


      </section>
      <!-- admin container section -->

      <section class="user-container hidden ">
      <section class="my-pending-tasks">
        <div class="my-pending-tasks__title">
          <h2>My tasks</h2>
        </div>

        <div class="my-pending-tasks-container">
          <div class="my-pending-tasks__labels">
            <div class="my-pending-tasks__header"></div>
            <div class="my-pending-tasks__header">Description</div>
            <div class="my-pending-tasks__header">Due</div>

          </div>

          <div class="my-pending-tasks__all-rows">
            <div class="row">
              <div class= "my-pending-tasks__data">
              <input type="checkbox" id="completedtask" name="completedtask" />
              </div>
              <div class="my-pending-tasks__data">Task 1</div>
              <div class="my-pending-tasks__data">Tomorrow</div>

            </div>
          </div>
        </div>
      </section>

       <section class="my-completed-tasks">
         <div class="my-completed-tasks__title">
                <h2>Completed tasks</h2>
         </div>

        <div class="my-completed-tasks__container">
          <div class="my-completed-tasks__labels">
            <div class="my-completed-tasks__header">Description</div>
            <div class="my-completed-tasks__header">Due</div>

          </div>

          <div class="my-completed-tasks__all-rows">
            <div class="row">
              <div class="my-completed-tasks__data">Task 1</div>
              <div class="my-completed-tasks__data">Tomorrow</div>

          </div>
          </div>
        </div>
      </section>


    </section>
