<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>signup page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>
<body>
<!--<div class="signup__container">-->
<div class="signup">
    <form class=signup__form action="/registration" method="POST">

   <div class="signup__fields">
<!--       <div class="signup__flex">-->
       <div class = "signup__heading"><p>sign up :)</p></div>

    <div class="signup__input-box">

    <input id="firstName" type="text" name="firstName"  placeholder="First Name" required >
    </div>

    <div  class="signup__input-box">
        <input id="lastName" type="text" name="lastName" placeholder="Last Name" required>
    </div>
    <div  class="signup__input-box">
        <input id="email" type="text" name="username" placeholder="Email" required />
    </div>
    <div  class="signup__input-box">
        <input id="password" type = "password" name="password" placeholder="Password">
    </div>
       <div class="signup__btn">
       <button type="submit">Sign Up</button>
       </div>
       </div>
<!--   </div>-->


</form>
</div>

</body>
</html>
